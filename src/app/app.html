
<div *ngIf="!offlineSync.isOnline" class="bg-red-500 text-white text-center py-2 font-semibold z-[9999] relative">
  Estás sin conexión. Los cambios se guardarán localmente y se sincronizarán cuando regrese el internet.
</div>

<!-- Global Toast Notification -->
<div *ngIf="toastMessage()" class="fixed top-4 right-4 z-[9999] animate-fade-in-down">
  <div class="bg-blue-600 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 border border-blue-400/30 backdrop-blur-md">
    <div class="p-2 bg-blue-500/30 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
    </div>
    <div>
      <h4 class="font-bold text-sm">Notificación</h4>
      <p class="text-sm text-blue-50">{{ toastMessage() }}</p>
    </div>
    <button (click)="toastMessage.set(null)" class="ml-4 text-white/50 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>
</div>

<router-outlet></router-outlet>
